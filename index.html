<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Obscuron Void Labs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: black;
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

/* VIDEO BACKGROUND */
#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  background: black;
}

/* DARK OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1;
}

/* CONTENT */
#content {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 2rem;
}

h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
}

p {
  max-width: 600px;
  margin: 1rem auto 2rem;
  color: #cfd2ff;
}

a {
  padding: 0.9rem 2rem;
  border-radius: 30px;
  background: #7c7cff;
  color: black;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video
  id="bg-video"
  muted
  loop
  playsinline
  preload="auto"
  poster="bg.webp"
>
  <source src="./bg.mp4" type="video/mp4" />
</video>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- CONTENT -->
<div id="content">
  <div>
    <h1>Obscuron Void Labs</h1>
    <p>Engineering intelligence beyond observable limits.</p>
    <a href="mailto:contact@obscuronvoidlabs.com">Contact</a>
  </div>
</div>

<script>
const video = document.getElementById("bg-video");

// Force play on load
window.addEventListener("load", () => {
  const playPromise = video.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // Autoplay fallback (mobile)
      video.muted = true;
      video.play();
    });
  }
});
</script>

</body>
</html>
