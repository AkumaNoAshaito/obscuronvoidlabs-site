<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Obscuron Void Labs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

/* VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
}

.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* CONTENT */
.content {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
  padding: 1.5rem;
}

h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
  letter-spacing: 1px;
}

p {
  max-width: 620px;
  margin: 1rem auto 2rem;
  color: #cfd2ff;
  font-size: 1.1rem;
}

a {
  display: inline-block;
  padding: 0.9rem 2rem;
  border-radius: 30px;
  background: #7c7cff;
  color: #000;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<div class="video-bg">
  <video autoplay muted loop playsinline preload="auto">
    <source src="bg.mp4" type="video/mp4">
  </video>
</div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- CONTENT -->
<div class="content">
  <div>
    <h1>Obscuron Void Labs</h1>
    <p>
      Engineering intelligence beyond observable limits.
    </p>
    <a href="mailto:contact@obscuronvoidlabs.com">Contact</a>
  </div>
</div>

</body>
</html>
